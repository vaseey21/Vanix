name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
      # Phone-sized build: release mode, arm64 only (~20 MB vs 144 MB debug
      # fat APK). Release is signed with the debug keystore (see
      # android/app/build.gradle.kts), so it installs like any test build.
      - run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: vanix-debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: vanix-arm64-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
