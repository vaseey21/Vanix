name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: vanix-debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # Also publish as a GitHub Release asset — downloadable directly from
      # github.com/objects.githubusercontent.com, unlike the Actions artifact
      # store (Azure Blob), which is unreachable from some restricted networks.
      - name: Publish debug APK as a release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk /tmp/vanix-debug.apk
          gh release create "apk-run-${{ github.run_number }}" /tmp/vanix-debug.apk \
            --repo "${{ github.repository }}" \
            --title "Debug APK — build ${{ github.run_number }}" \
            --notes "Automated debug build from commit ${{ github.sha }}. Frontend-only, no backend wired up yet."
