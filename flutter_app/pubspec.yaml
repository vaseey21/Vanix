name: vanix
description: MyBovine.ai — cattle health monitoring app (Vanix Technologies)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  intl: ^0.19.0
  video_player: ^2.13.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/hero.mp4
    # TODO: assets/logos/vanix-logo.svg is referenced in CLAUDE.md as the source
    # of truth but isn't present in this repo yet and nothing in lib/ uses it —
    # add the real file to assets/logos/ and re-list it here (plus flutter_svg
    # in pubspec dependencies) once available.
    - assets/images/cow_lying.png
    - assets/images/cow_icon.png
    - assets/images/bull_icon.png
    - assets/images/pregnancy_icon.png
    - assets/images/insemination_icon.png
    - assets/images/fever_photo.jpg
    - assets/images/heat_photo.jpg
    - assets/images/insemination_photo.jpg
    - assets/images/delivery_photo.jpg
    - assets/images/vetvisit_photo.jpg
    - assets/images/milking_started_photo.jpg
    - assets/images/milking_ended_photo.jpg
    - assets/images/gestation_photo.jpg

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansDevanagari-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansDevanagari-SemiBold.ttf
          weight: 600
