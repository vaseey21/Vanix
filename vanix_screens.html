<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanix — Screens</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens (keep in sync with vanix_theme.dart) ── */
    :root {
      --green:    #4DDE95;
      --dark1:    #111111;
      --dark2:    #1C1C1C;
      --bgwarm:   #F2EDE4;
      --bgcard:   #FFFFFF;
      --activebg: #E8F5EE;
      --text1:    #111111;
      --text2:    #8C8780;
      --textdark: #FFFFFF;
      --border:   #D8D0C5;
      --warning:  #E8A020;
      --danger:   #D44C3A;
      --warnbg:   #FFF8E8;
      --dangerbg: #FDEAE3;
      --font-en:  'Noto Sans', sans-serif;
      --font-hi:  'Noto Sans Devanagari', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1A1A;
      font-family: var(--font-hi);
      padding: 40px 20px 80px;
    }

    /* ── Layout ── */
    .screen-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
    }

    .screen-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .screen-label {
      font-family: var(--font-en);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }

    /* ── Phone frame ── */
    .phone {
      width: 320px;
      background: var(--bgwarm);
      border-radius: 36px;
      overflow: hidden;
      border: 6px solid #2A2A2A;
      box-shadow: 0 0 0 1px #333;
      min-height: 580px;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      background: var(--dark1);
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      flex-shrink: 0;
    }
    .status-time {
      font-family: var(--font-en);
      font-size: 12px;
      font-weight: 600;
      color: white;
    }
    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .status-icons span {
      font-size: 11px;
      color: white;
    }

    /* ── Components ── */
    .hi { font-family: var(--font-hi); }
    .en { font-family: var(--font-en); }

    input { outline: none; }
    button { cursor: pointer; }
  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom: 40px;">
    <p style="font-family:'Noto Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#444; margin-bottom:8px;">Vanix · Screen builds</p>
    <h1 style="font-family:'Noto Sans',sans-serif; font-size:22px; font-weight:600; color:white;">Screens</h1>
    <p style="font-family:'Noto Sans',sans-serif; font-size:13px; color:#555; margin-top:6px;">Refer to <a href="vanix_design_system.html" style="color:#4DDE95;">vanix_design_system.html</a> for tokens &amp; rules</p>
  </div>

        </div>

        <!-- Form -->
        <div style="padding:24px 20px 20px; display:flex; flex-direction:column; gap:18px; flex:1;">

          <!-- Language toggle -->
          <div>
            <p style="font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text2); margin:0 0 8px;" class="en">Language / भाषा</p>
            <div style="display:flex; gap:8px;">
              <button style="flex:1; height:36px; background:var(--dark1); color:white; border:1.5px solid var(--dark1); border-radius:8px; font-size:13px; font-family:var(--font-hi);">हिंदी</button>
              <button style="flex:1; height:36px; background:white; color:var(--text2); border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:var(--font-hi);">भोजपुरी</button>
              <button style="flex:1; height:36px; background:white; color:var(--text2); border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:var(--font-en);">English</button>
            </div>
          </div>

          <!-- Phone -->
          <div>
            <p style="font-size:14px; font-weight:500; color:var(--text1); margin:0 0 8px;" class="hi">मोबाइल नंबर</p>
            <div style="display:flex;">
              <div style="height:48px; min-width:56px; background:var(--bgwarm); border:1.5px solid var(--border); border-right:none; border-radius:12px 0 0 12px; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text1); font-weight:500;" class="en">+91</div>
              <input type="tel" placeholder="98765 43210" style="height:48px; flex:1; background:white; border:1.5px solid var(--border); border-left:none; border-radius:0 12px 12px 0; padding:0 14px; font-size:16px; color:var(--text1); font-family:var(--font-en);">
            </div>
            <p style="font-size:12px; color:var(--text2); margin:6px 0 0;" class="hi">हम एक OTP भेजेंगे</p>
          </div>

          <!-- CTA -->
          <button style="width:100%; height:52px; background:var(--dark1); color:white; border:none; border-radius:26px; font-size:16px; font-weight:500; font-family:var(--font-hi); display:flex; align-items:center; justify-content:center; gap:8px;">
            OTP भेजें →
          </button>

          <!-- Divider -->
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="flex:1; height:1px; background:var(--border);"></div>
            <span style="font-size:12px; color:var(--text2);" class="hi">या</span>
            <div style="flex:1; height:1px; background:var(--border);"></div>
          </div>

          <!-- Register -->
          <div style="text-align:center;">
            <p style="font-size:14px; color:var(--text2); margin:0 0 4px;" class="hi">नया खाता नहीं है?</p>
            <p style="font-size:14px; font-weight:600; color:var(--text1); text-decoration:underline;" class="hi">अपना खेत जोड़ें</p>
          </div>
        </div>

        <!-- Footer -->
        <div style="padding:12px 20px; border-top:1px solid var(--border); background:#EDE8DF; text-align:center;">
          <p style="font-size:11px; color:var(--text2);" class="hi">साइन इन करके आप हमारी <span style="color:var(--text1); font-weight:500;">गोपनीयता नीति</span> से सहमत हैं</p>
        </div>

    </div><!-- /screen-wrap -->
